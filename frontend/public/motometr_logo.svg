<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="badgeGrad" x1="40" y1="40" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161b22"/>
      <stop offset="1" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="104" y1="156" x2="238" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="130" y1="218" x2="244" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="40" y="50" width="280" height="280" rx="68" fill="url(#badgeGrad)"/>
    <rect x="40.5" y="50.5" width="279" height="279" rx="67.5" stroke="#30363d"/>
  </g>

  <!-- Garage roof / shield -->
  <path d="M88 145L180 84L272 145" stroke="#e6edf3" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M108 160H252" stroke="#8b949e" stroke-opacity="0.72" stroke-width="10" stroke-linecap="round"/>

  <!-- Analytic bars -->
  <rect x="104" y="212" width="34" height="56" rx="10" fill="url(#barGrad)"/>
  <rect x="154" y="186" width="34" height="82" rx="10" fill="url(#barGrad)"/>
  <rect x="204" y="156" width="34" height="112" rx="10" fill="url(#barGrad)"/>

  <!-- Rising profit line -->
  <path d="M121 204L171 178L221 147" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M213 142L236 141L227 160" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small baseline -->
  <path d="M98 286H262" stroke="#8b949e" stroke-opacity="0.26" stroke-width="10" stroke-linecap="round"/>

  <!-- Subtle accent dot -->
  <circle cx="266" cy="104" r="8" fill="#3fb950" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="390" y="190" fill="#e6edf3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="116" font-weight="800" letter-spacing="1.5">MOTOMETR</text>
  <text x="394" y="246" fill="#8b949e" font-family="JetBrains Mono, Fira Code, Cascadia Code, monospace" font-size="31" font-weight="600" letter-spacing="2.2">ANALIZA RYNKU POJAZDÓW</text>
  <rect x="394" y="272" width="340" height="8" rx="4" fill="#58a6ff"/>
</svg>
